<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My rides · MyRides</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body data-page="my-rides" class="app-body">
  <div class="shell shell-wide">
    <header class="app-topbar">
      <a href="index.html" class="brand-link">MyRides</a>
      <button type="button" class="mobile-menu-button" aria-expanded="false" aria-controls="my-rides-mobile-menu-panel"
        aria-label="Open navigation menu" data-mobile-menu-button>
        <span class="visually-hidden">Menu</span>
        <span class="mobile-menu-button-line"></span>
        <span class="mobile-menu-button-line"></span>
        <span class="mobile-menu-button-line"></span>
      </button>
      <div class="topbar-user" data-mobile-menu-desktop-actions>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="profile.html" class="nav-link">Profile</a>
        <button type="button" id="logout-button" class="button-secondary">Logout</button>
      </div>
      <div id="my-rides-mobile-menu-panel" class="mobile-menu-panel" data-mobile-menu-panel hidden>
        <div class="mobile-menu-panel-actions">
          <a href="dashboard.html" class="nav-link">Dashboard</a>
          <a href="profile.html" class="nav-link">Profile</a>
          <button type="button" class="button-secondary" data-logout-button>Logout</button>
        </div>
      </div>
    </header>

    <main class="page-grid single-column">
      <section class="panel-card">
        <span class="eyebrow">Your activity</span>
        <h1>My rides</h1>
        <p class="section-copy">See rides you created and rides you joined.</p>
        <div id="page-feedback" class="feedback" aria-live="polite"></div>
      </section>

      <section class="panel-card">
        <h2>Driving</h2>
        <div id="my-driving-rides" class="rides-grid"></div>
      </section>

      <section class="panel-card">
        <h2>As passenger</h2>
        <div id="my-passenger-rides" class="rides-grid"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>

</html>
