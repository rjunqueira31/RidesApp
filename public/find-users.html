<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find users · MyRides</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body data-page="find-users" class="app-body">
  <div class="shell shell-wide">
    <header class="app-topbar">
      <a href="index.html" class="brand-link">MyRides</a>
      <button type="button" class="mobile-menu-button" aria-expanded="false"
        aria-controls="find-users-mobile-menu-panel" aria-label="Open navigation menu" data-mobile-menu-button>
        <span class="visually-hidden">Menu</span>
        <span class="mobile-menu-button-line"></span>
        <span class="mobile-menu-button-line"></span>
        <span class="mobile-menu-button-line"></span>
      </button>
      <div class="topbar-user" data-mobile-menu-desktop-actions>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="profile.html" class="nav-link">Profile</a>
        <button type="button" id="logout-button" class="button-secondary">Logout</button>
      </div>
      <div id="find-users-mobile-menu-panel" class="mobile-menu-panel" data-mobile-menu-panel hidden>
        <div class="mobile-menu-panel-actions">
          <a href="dashboard.html" class="nav-link">Dashboard</a>
          <a href="profile.html" class="nav-link">Profile</a>
          <button type="button" class="button-secondary" data-logout-button>Logout</button>
        </div>
      </div>
    </header>

    <main class="page-grid single-column">
      <section class="panel-card">
        <span class="eyebrow">Contact users</span>
        <h1>Find users</h1>
        <p class="section-copy">Search by name, email, or user ID to quickly find who you need to contact.</p>

        <form id="find-users-form" class="toolbar search-toolbar user-search-toolbar">
          <input type="text" name="query" placeholder="Search by name, email, or #A1B2C3" />
          <button type="button" id="reset-user-search" class="button-secondary">Reset</button>
        </form>

        <div id="users-results" class="user-results-grid"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>

</html>
