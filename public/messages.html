<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages · MyRides</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body data-page="messages" class="app-body">
  <div class="shell shell-wide">
    <header class="app-topbar">
      <a href="index.html" class="brand-link">MyRides</a>
      <button type="button" class="mobile-menu-button" aria-expanded="false" aria-controls="messages-mobile-menu-panel"
        aria-label="Open navigation menu" data-mobile-menu-button>
        <span class="visually-hidden">Menu</span>
        <span class="mobile-menu-button-line"></span>
        <span class="mobile-menu-button-line"></span>
        <span class="mobile-menu-button-line"></span>
      </button>
      <div class="topbar-user" data-mobile-menu-desktop-actions>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="messages.html" class="nav-link nav-link-messages">
          Messages
          <span class="nav-unread-badge" hidden></span>
        </a>
        <a href="profile.html" class="nav-link">Profile</a>
        <button type="button" id="logout-button" class="button-secondary">Logout</button>
      </div>
      <div id="messages-mobile-menu-panel" class="mobile-menu-panel" data-mobile-menu-panel hidden>
        <div class="mobile-menu-panel-actions">
          <a href="dashboard.html" class="nav-link">Dashboard</a>
          <a href="messages.html" class="nav-link nav-link-messages">
            Messages
            <span class="nav-unread-badge" hidden></span>
          </a>
          <a href="profile.html" class="nav-link">Profile</a>
          <button type="button" class="button-secondary" data-logout-button>Logout</button>
        </div>
      </div>
    </header>

    <main class="dm-layout">
      <aside class="dm-sidebar" id="dm-sidebar">
        <div class="dm-sidebar-header">
          <h2>Messages</h2>
        </div>
        <div class="dm-conversation-list" id="dm-conversation-list">
          <div class="empty-state">Loading conversations...</div>
        </div>
      </aside>
      <section class="dm-chat" id="dm-chat">
        <div class="dm-chat-placeholder">
          <p class="meta">Select a conversation to start messaging</p>
        </div>
      </section>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>

</html>
